{% extends "base.html" %}
{% block title %}Accedi — FutureSoccer{% endblock %}
{% block extra_head %}
<style>
  .auth-wrap { max-width: 440px; margin: 4rem auto; }
  .auth-header { text-align: center; margin-bottom: 2rem; }
  .auth-header h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
  .auth-header p { color: var(--muted); }
  .auth-card {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 16px; padding: 2.5rem; position: relative; overflow: hidden;
  }
  .auth-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg,var(--cyan),var(--purple));
  }
  .auth-footer { text-align: center; margin-top: 1.5rem; color: var(--muted); font-size: 0.9rem; }
  .auth-footer a { color: var(--cyan); text-decoration: none; }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-header">
    <h1 class="text-cyan">ACCESSO</h1>
    <p>Bentornato, Manager. Il campo ti aspetta.</p>
  </div>
  <div class="auth-card">
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>EMAIL</label>
        <input type="email" name="email" class="form-control" placeholder="manager@futuresoccer.com" required>
      </div>
      <div class="form-group">
        <label>PASSWORD</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <div class="form-group" style="display:flex;justify-content:space-between;align-items:center;">
        <label style="display:flex;align-items:center;gap:0.5rem;color:var(--text);cursor:pointer;font-size:0.85rem;">
          <input type="checkbox" name="remember"> Ricordami
        </label>
        <a href="{{ url_for('auth.forgot_password') }}" style="color:var(--muted);font-size:0.85rem;text-decoration:none;">Password dimenticata?</a>
      </div>
      <button type="submit" class="btn btn-primary btn-block" style="margin-top:0.5rem;padding:0.85rem;">
        ACCEDI
      </button>
    </form>
  </div>
  <div class="auth-footer">
    Non hai un account? <a href="{{ url_for('auth.register') }}">Registrati ora</a>
  </div>
</div>
{% endblock %}
