{% extends "base.html" %}
{% block title %}Password Dimenticata — FutureSoccer{% endblock %}
{% block content %}
<div style="max-width:440px;margin:4rem auto;">
  <div style="text-align:center;margin-bottom:2rem;">
    <h1 class="text-cyan">RESET PASSWORD</h1>
    <p style="color:var(--muted);">Inserisci la tua email per ricevere il link di reset.</p>
  </div>
  <div class="card" style="position:relative;overflow:hidden;">
    <div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--danger),var(--purple));"></div>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>EMAIL</label>
        <input type="email" name="email" class="form-control" placeholder="manager@futuresoccer.com" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block" style="padding:0.85rem;">
        INVIA LINK DI RESET
      </button>
    </form>
  </div>
  <div style="text-align:center;margin-top:1.5rem;color:var(--muted);font-size:0.9rem;">
    <a href="{{ url_for('auth.login') }}" style="color:var(--cyan);text-decoration:none;">← Torna al login</a>
  </div>
</div>
{% endblock %}
