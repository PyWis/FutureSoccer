{% extends "base.html" %}
{% block title %}Nuova Password — FutureSoccer{% endblock %}
{% block content %}
<div style="max-width:440px;margin:4rem auto;">
  <div style="text-align:center;margin-bottom:2rem;">
    <h1 class="text-cyan">NUOVA PASSWORD</h1>
    <p style="color:var(--muted);">Scegli una nuova password sicura.</p>
  </div>
  <div class="card" style="position:relative;overflow:hidden;">
    <div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--danger),var(--purple));"></div>
    <form method="POST">
      <div class="form-group">
        <label>NUOVA PASSWORD</label>
        <input type="password" name="password" class="form-control" placeholder="Almeno 8 caratteri" required minlength="8">
      </div>
      <div class="form-group">
        <label>CONFERMA PASSWORD</label>
        <input type="password" name="confirm_password" class="form-control" placeholder="Ripeti la password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block" style="padding:0.85rem;">
        SALVA NUOVA PASSWORD
      </button>
    </form>
  </div>
</div>
{% endblock %}
