{% extends "base.html" %}
{% block title %}{{ 'Modifica' if player else 'Nuovo' }} Giocatore — Admin{% endblock %}
{% block content %}
<div class="page-header">
  <h1>{{ '✏️ MODIFICA GIOCATORE' if player else '➕ NUOVO GIOCATORE' }}</h1>
</div>
<div style="max-width:580px;">
  <div class="card">
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="grid-2">
        <div class="form-group">
          <label>NOME *</label>
          <input type="text" name="name" class="form-control" value="{{ player.name if player else '' }}" required>
        </div>
        <div class="form-group">
          <label>TIPO</label>
          <select name="type" class="form-control">
            {% for t in types %}
            <option value="{{ t }}" {{ 'selected' if player and player.type == t }}>
              {{ {'uomo':'👨 Uomo','donna':'👩 Donna','cyber':'🤖 Cyber'}[t] }}
            </option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>ETÀ</label>
        <input type="number" name="age" class="form-control" value="{{ player.age if player else 19 }}" min="16" max="45">
      </div>
      <h3 class="mt-3 mb-2">STATISTICHE (0.5 — 6.5)</h3>
      <div class="grid-2">
        <div class="form-group">
          <label>PORTA</label>
          <input type="number" name="porta" class="form-control" value="{{ "%.1f"|format(player.porta) if player else 3.0 }}" min="0.5" max="6.5" step="0.1">
        </div>
        <div class="form-group">
          <label>DIFESA</label>
          <input type="number" name="difesa" class="form-control" value="{{ "%.1f"|format(player.difesa) if player else 3.0 }}" min="0.5" max="6.5" step="0.1">
        </div>
        <div class="form-group">
          <label>ATTACCO</label>
          <input type="number" name="attacco" class="form-control" value="{{ "%.1f"|format(player.attacco) if player else 3.0 }}" min="0.5" max="6.5" step="0.1">
        </div>
        <div class="form-group">
          <label>RESISTENZA</label>
          <input type="number" name="resistenza" class="form-control" value="{{ "%.1f"|format(player.resistenza) if player else 3.0 }}" min="0.5" max="6.5" step="0.1">
        </div>
      </div>
      <div class="form-group">
        <label>SQUADRA</label>
        <select name="team_id" class="form-control">
          <option value="">— Nessuna (Free Agent) —</option>
          {% for t in teams %}
          <option value="{{ t.id }}" {{ 'selected' if player and player.team_id == t.id }}>{{ t.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="flex gap-2 mt-3">
        <button type="submit" class="btn btn-primary">{{ 'Salva' if player else 'Crea Giocatore' }}</button>
        <a href="{{ url_for('admin.players_list') }}" class="btn btn-secondary">Annulla</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
