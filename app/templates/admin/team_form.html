{% extends "base.html" %}
{% block title %}{{ 'Modifica' if team else 'Nuova' }} Squadra — Admin{% endblock %}
{% block content %}
<div class="page-header">
  <h1>{{ '✏️ MODIFICA SQUADRA' if team else '➕ NUOVA SQUADRA' }}</h1>
</div>

<div style="max-width:600px;">
  <div class="card">
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="grid-2">
        <div class="form-group">
          <label>NOME SQUADRA *</label>
          <input type="text" name="name" class="form-control" value="{{ team.name if team else '' }}" required>
        </div>
        <div class="form-group">
          <label>CITTÀ *</label>
          <input type="text" name="city" class="form-control" value="{{ team.city if team else '' }}" required>
        </div>
      </div>
      <div class="form-group">
        <label>STADIO *</label>
        <input type="text" name="stadium" class="form-control" value="{{ team.stadium if team else '' }}" required placeholder="Es: Neo-Stadio Galattico">
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label>BUDGET (€)</label>
          <input type="number" name="budget" class="form-control" value="{{ team.budget if team else 50000000 }}" min="0" step="1000000">
        </div>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label>COLORE PRIMARIO</label>
          <input type="color" name="color_primary" class="form-control" value="{{ team.color_primary if team else '#00f5ff' }}" style="height:46px;cursor:pointer;">
        </div>
        <div class="form-group">
          <label>COLORE SECONDARIO</label>
          <input type="color" name="color_secondary" class="form-control" value="{{ team.color_secondary if team else '#7b2fff' }}" style="height:46px;cursor:pointer;">
        </div>
      </div>
      <div class="flex gap-2 mt-3">
        <button type="submit" class="btn btn-primary">{{ 'Salva Modifiche' if team else 'Crea Squadra' }}</button>
        <a href="{{ url_for('admin.teams_list') }}" class="btn btn-secondary">Annulla</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
